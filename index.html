<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportsBetting.ag Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117; color: #e6edf3;
      height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    header { width: 100%; max-width: 800px; padding: 20px 16px 12px; border-bottom: 1px solid #21262d; }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #58a6ff; }
    header p { font-size: 0.8rem; color: #8b949e; margin-top: 2px; }
    #chat-container {
      flex: 1; width: 100%; max-width: 800px;
      overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message { display: flex; gap: 10px; }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 600;
    }
    .message.user .avatar { background: #1f6feb; color: #fff; }
    .message.assistant .avatar { background: #238636; color: #fff; }
    .bubble {
      padding: 10px 14px; border-radius: 12px; max-width: 75%;
      line-height: 1.6; font-size: 0.9rem;
    }
    .message.user .bubble { background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #161b22; border: 1px solid #21262d; border-bottom-left-radius: 4px; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 8px 0 4px; color: #58a6ff; font-size: 1rem; }
    .bubble p { margin: 4px 0; }
    .bubble ul, .bubble ol { margin: 4px 0 4px 16px; }
    .bubble li { margin: 2px 0; }
    .bubble a { color: #58a6ff; }
    .bubble code { background: #0d1117; padding: 1px 4px; border-radius: 4px; font-size: 0.85em; }
    .badge {
      display: inline-block; font-size: 0.65rem; padding: 2px 6px;
      border-radius: 10px; margin-left: 6px; font-weight: 600; vertical-align: middle;
    }
    .badge.nba  { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb55; }
    .badge.mlb  { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb55; }
    .badge.nhl  { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb55; }
    .badge.boost { background: #2ea04322; color: #3fb950; border: 1px solid #2ea04355; }
    .badge.menu { background: #6e40c922; color: #a371f7; border: 1px solid #6e40c955; }
    .badge.live { background: #da363322; color: #f85149; border: 1px solid #da363355; }
    .typing { opacity: 0.6; font-style: italic; }
    #input-area {
      width: 100%; max-width: 800px; padding: 12px 16px 16px;
      border-top: 1px solid #21262d; display: flex; gap: 8px;
    }
    #user-input {
      flex: 1; background: #161b22; border: 1px solid #21262d;
      border-radius: 8px; color: #e6edf3; padding: 10px 14px;
      font-size: 0.9rem; resize: none; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    #user-input:focus { border-color: #58a6ff; }
    #user-input::placeholder { color: #8b949e; }
    #send-btn {
      background: #1f6feb; color: #fff; border: none; border-radius: 8px;
      padding: 0 18px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s; align-self: flex-end; height: 40px;
    }
    #send-btn:hover { background: #388bfd; }
    #send-btn:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }
    .suggestions {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 0 16px 8px; width: 100%; max-width: 800px;
    }
    .suggestion {
      background: #161b22; border: 1px solid #21262d; border-radius: 20px;
      padding: 6px 12px; font-size: 0.78rem; color: #8b949e;
      cursor: pointer; transition: all 0.2s;
    }
    .suggestion:hover { border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>
  <header>
    <h1>🏆 SportsBetting.ag Assistant</h1>
    <p>Powered by live data + Claude AI</p>
  </header>
  <div id="chat-container"></div>
  <div class="suggestions">
    <span class="suggestion" onclick="sendSuggestion(this)">Best NBA odds right now?</span>
    <span class="suggestion" onclick="sendSuggestion(this)">Show me today's daily boosters</span>
    <span class="suggestion" onclick="sendSuggestion(this)">What sports can I bet on?</span>
    <span class="suggestion" onclick="sendSuggestion(this)">UFC fights this week?</span>
  </div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask about NBA, MLB, UFC, boosters…"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <script>
    marked.setOptions({ breaks: true });
    const chatContainer = document.getElementById("chat-container");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const history = [];

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendSuggestion(el) { userInput.value = el.textContent; sendMessage(); }

    function appendMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "You" : "AI";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return bubble;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || sendBtn.disabled) return;
      userInput.value = "";
      sendBtn.disabled = true;
      appendMessage("user", text);
      const typingBubble = appendMessage("assistant", "Fetching live data…");
      typingBubble.classList.add("typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, history }),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";
        let meta = {};
        let firstChunk = true;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const lines = decoder.decode(value).split("\n");
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const payload = JSON.parse(line.slice(6));
              if (payload.text) {
                if (firstChunk) { typingBubble.classList.remove("typing"); firstChunk = false; }
                fullText += payload.text;
                typingBubble.innerHTML = marked.parse(fullText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
              }
              if (payload.done) meta = payload;
              if (payload.error) typingBubble.textContent = "Error: " + payload.error;
            } catch (_) {}
          }
        }

        if (meta.intent) {
          const badge = document.createElement("span");
          badge.className = `badge ${meta.intent}`;
          badge.textContent = meta.intent.toUpperCase();
          typingBubble.appendChild(badge);
        }
        if (meta.live) {
          const liveBadge = document.createElement("span");
          liveBadge.className = "badge live";
          liveBadge.textContent = "LIVE";
          typingBubble.appendChild(liveBadge);
        }

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: fullText });
        if (history.length > 20) history.splice(0, 2);

      } catch (err) {
        typingBubble.classList.remove("typing");
        typingBubble.textContent = "Sorry, something went wrong: " + err.message;
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }
  </script>
</body>
</html>
