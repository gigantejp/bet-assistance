<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportsbook Home (Demo ESPN)</title>
  <style>
    :root {
      --bg: #0b1e2b;
      --panel: #10293a;
      --card: #16364a;
      --card-dark: #0f2737;
      --text: #e9f1f6;
      --muted: #9bb4c3;
      --accent: #44a9ff;
      --line: #244659;
      --good: #2dcf70;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #0d2332;
      padding: 20px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: .3px;
    }

    .menu-title {
      color: var(--muted);
      font-size: 0.76rem;
      margin: 14px 0 8px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .menu button {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      text-align: left;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: .95rem;
      margin-bottom: 6px;
    }

    .menu button:hover,
    .menu button.active {
      background: #12344b;
      border-color: #1f5677;
    }

    .main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
    }

    .title h1 { font-size: 1.5rem; }
    .title p { color: var(--muted); font-size: .9rem; margin-top: 4px; }

    .refresh {
      background: var(--accent);
      color: #001523;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .section-title {
      font-size: 1.15rem;
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 8px;
    }

    .teams { font-weight: 700; line-height: 1.45; margin-bottom: 10px; }

    .status {
      display: inline-flex;
      background: #12344b;
      border: 1px solid #1d4c69;
      border-radius: 999px;
      font-size: .78rem;
      padding: 4px 9px;
      color: var(--muted);
    }

    .status.live {
      color: var(--good);
      border-color: #1e6942;
      background: #0c2b1c;
    }

    .table {
      margin-top: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 170px 1fr 220px;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .row:last-child { border-bottom: 0; }

    .time { color: var(--muted); font-size: .86rem; }

    .matchup { font-weight: 600; }

    .odds {
      background: var(--card-dark);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px 10px;
      color: #9ed0ff;
      text-align: right;
      font-size: .9rem;
    }

    .loading,
    .empty {
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        height: auto;
        position: static;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .row { grid-template-columns: 1fr; }
      .odds { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">🏟️ Sportsbook Demo</div>
      <div class="menu-title">Top Sports</div>
      <div class="menu" id="sports-menu"></div>
      <div class="menu-title">Fuente</div>
      <div class="meta">Datos en vivo desde APIs públicas de ESPN.</div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">
          <h1>Home de Sportsbook</h1>
          <p>Versión básica para arrancar (sin apuestas reales).</p>
        </div>
        <button class="refresh" id="refresh-btn">Actualizar</button>
      </div>

      <h2 class="section-title">🔥 Top Picks</h2>
      <section id="top-picks" class="cards">
        <div class="loading">Cargando partidos...</div>
      </section>

      <h2 class="section-title">📅 Popular Events</h2>
      <section id="events-table" class="table">
        <div class="loading">Cargando calendario...</div>
      </section>
    </main>
  </div>

  <script>
    const sports = [
      { key: 'nba', label: '🏀 NBA' },
      { key: 'nfl', label: '🏈 NFL' },
      { key: 'mlb', label: '⚾ MLB' },
      { key: 'nhl', label: '🏒 NHL' },
      { key: 'soccer', label: '⚽ Soccer' },
      { key: 'ufc', label: '🥊 UFC' },
    ];

    let currentSport = 'nba';

    const menu = document.getElementById('sports-menu');
    const topPicks = document.getElementById('top-picks');
    const eventsTable = document.getElementById('events-table');
    const refreshBtn = document.getElementById('refresh-btn');
    const espnEndpoints = {
      nba: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
      nfl: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard',
      mlb: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
      nhl: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard',
      soccer: 'https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard',
      ufc: 'https://site.api.espn.com/apis/site/v2/sports/mma/ufc/scoreboard',
    };

    function renderMenu() {
      menu.innerHTML = sports.map(s => `
        <button data-sport="${s.key}" class="${s.key === currentSport ? 'active' : ''}">${s.label}</button>
      `).join('');

      menu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentSport = btn.dataset.sport;
          renderMenu();
          loadSport();
        });
      });
    }

    function statusClass(status) {
      const text = (status || '').toLowerCase();
      return text.includes('progress') || text.includes('live') || text.includes('halftime')
        ? 'status live'
        : 'status';
    }

    function formatDate(dateIso) {
      if (!dateIso) return 'TBD';
      return new Date(dateIso).toLocaleString('es-ES', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function fakeOdds(index) {
      const values = ['-110 / -110', '-135 / +120', '+105 / -125', '-150 / +130'];
      return values[index % values.length];
    }

    async function fetchScoreboard(sport) {
      const espnUrl = espnEndpoints[sport];
      if (!espnUrl) throw new Error('Deporte no soportado');

      if (!/^https?:\/\//i.test(espnUrl)) {
        throw new Error(`URL inválida para ${sport}`);
      }

      const remoteResponse = await fetch(espnUrl, { cache: 'no-store' });
      if (!remoteResponse.ok) throw new Error(`Error ${remoteResponse.status}`);

      return await remoteResponse.json();
    }

    async function loadSport() {
      topPicks.innerHTML = '<div class="loading">Cargando Top Picks...</div>';
      eventsTable.innerHTML = '<div class="loading">Cargando eventos...</div>';

      try {
        const data = await fetchScoreboard(currentSport);
        const events = data.events || [];

        if (!events.length) {
          topPicks.innerHTML = '<div class="empty">No hay eventos disponibles por ahora.</div>';
          eventsTable.innerHTML = '<div class="empty">Sin calendario disponible.</div>';
          return;
        }

        const cards = events.slice(0, 3).map((event, idx) => {
          const comp = event.competitions?.[0];
          const teams = comp?.competitors || [];
          const away = teams.find(t => t.homeAway === 'away')?.team?.displayName || 'Visitante';
          const home = teams.find(t => t.homeAway === 'home')?.team?.displayName || 'Local';
          const status = comp?.status?.type?.description || 'Programado';
          return `
            <article class="card">
              <div class="meta">${formatDate(event.date)}</div>
              <div class="teams">${away}<br/>vs<br/>${home}</div>
              <span class="${statusClass(status)}">${status}</span>
            </article>
          `;
        }).join('');

        topPicks.innerHTML = cards;

        const rows = events.slice(0, 8).map((event, idx) => {
          const comp = event.competitions?.[0];
          const teams = comp?.competitors || [];
          const away = teams.find(t => t.homeAway === 'away')?.team?.displayName || 'Visitante';
          const home = teams.find(t => t.homeAway === 'home')?.team?.displayName || 'Local';
          const status = comp?.status?.type?.shortDetail || 'Programado';
          return `
            <div class="row">
              <div class="time">${formatDate(event.date)}</div>
              <div class="matchup">${away} vs ${home}<br/><span class="meta">${status}</span></div>
              <div class="odds">Cuotas demo: ${fakeOdds(idx)}</div>
            </div>
          `;
        }).join('');

        eventsTable.innerHTML = rows;
      } catch (error) {
        topPicks.innerHTML = `<div class="empty">No se pudo cargar ESPN (${error.message}).</div>`;
        eventsTable.innerHTML = '<div class="empty">Intenta actualizar en unos segundos.</div>';
      }
    }

    refreshBtn.addEventListener('click', loadSport);

    renderMenu();
    loadSport();
  </script>
</body>
</html>
